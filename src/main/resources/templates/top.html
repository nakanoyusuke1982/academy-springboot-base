<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TOP</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="header header-between">
        <div>My Portfolio</div>

        <form action="/logout" method="post">
            <button type="submit" class="header-button">
                ログアウト
            </button>
        </form>
    </div>

    <div class="page">
        <div class="profile-area">
            <div class="profile-left">
    <div class="profile-image">
        No Image
    </div>

    <p class="profile-name" th:text="${loginUser.name}">
        名前
    </p>
</div>

            <div class="profile-info">
                <h2>自己紹介</h2>

                <p th:text="${loginUser.profile != null ? loginUser.profile : '未設定'}">
                    未設定
                </p>

                <a th:href="@{/profile/edit}">
    <button type="button" class="edit-profile-button">
        自己紹介を編集する
    </button>
</a>
            </div>
        </div>

        <div class="chart-area">
            <h2>学習チャート</h2>

            <a th:href="@{/learning-data}">
                <button type="button">編集する</button>
            </a>

            <div class="chart-placeholder">
    <canvas id="learningChart"></canvas>
</div>
        </div>
    </div>

    <div class="footer">
        portfolio site
    </div>
<script th:inline="javascript">
    const ctx = document.getElementById('learningChart');

    const backendData =
        /*[[${backendData}]]*/ [0, 0, 0];

    const frontendData =
        /*[[${frontendData}]]*/ [0, 0, 0];

    const infraData =
        /*[[${infraData}]]*/ [0, 0, 0];

    new Chart(ctx, {
        type: 'bar',

        data: {
            labels: ['先々月', '先月', '今月'],

            datasets: [
                {
                    label: 'バックエンド',
                    data: backendData,
                    barPercentage: 0.45,
                    categoryPercentage: 0.55
                },
                {
                    label: 'フロントエンド',
                    data: frontendData,
                    barPercentage: 0.45,
                    categoryPercentage: 0.55
                },
                {
                    label: 'インフラ',
                    data: infraData,
                    barPercentage: 0.45,
                    categoryPercentage: 0.55
                }
            ]
        },

        options: {
            responsive: true,
            maintainAspectRatio: false,

            plugins: {
                title: {
                    display: true,
                    text: 'Chart.js Bar Chart'
                }
            },

            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
