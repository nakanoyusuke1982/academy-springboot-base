<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>学習データ一覧</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page">

    <!-- ヘッダー -->
    <header class="header header-between">
        <div class="header-title">My Portfolio</div>

        <form action="/logout" method="post">
            <button type="submit" class="header-button">
                ログアウト
            </button>
        </form>
    </header>

    <!-- メイン -->
    <main class="skill-edit-main">

        <!-- 対象月 -->
        <form method="get"
              action="/learning-data"
              class="skill-month-form">

            <select name="month"
                    onchange="this.form.submit()"
                    class="skill-month-select">

                <option th:each="month : ${monthList}"
                        th:value="${month}"
                        th:text="${month.monthValue + '月'}"
                        th:selected="${month.equals(selectedMonth)}">
                </option>

            </select>

        </form>

        <!-- バックエンド -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    バックエンド
                </h2>

               <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${backendCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="item : ${backendList}">

                        <td th:text="${item.itemName}">
                            Java
                        </td>

                        <td>
                            <input type="number"
       class="study-time-input"
       th:value="${item.studyTime}"
       min="0"
       step="1">
                        </td>

                        <td>
                            <button type="button"
                                    class="study-save-button">
                                学習内容を保存する
                            </button>
                        </td>

                        <td>
                            <button type="button"
                                    class="study-delete-button">
                                削除する
                            </button>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(backendList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

        <!-- フロントエンド -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    フロントエンド
                </h2>

              <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${frontendCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="item : ${frontendList}">

                        <td th:text="${item.itemName}">
                            HTML
                        </td>

                        <td>
                            <input type="number"
       class="study-time-input"
       th:value="${item.studyTime}"
       min="0"
       step="1">
                        </td>

                        <td>
                            <button type="button"
                                    class="study-save-button">
                                学習内容を保存する
                            </button>
                        </td>

                        <td>
                            <button type="button"
                                    class="study-delete-button">
                                削除する
                            </button>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(frontendList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

        <!-- インフラ -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    インフラ
                </h2>

               <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${infraCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="item : ${infraList}">

                        <td th:text="${item.itemName}">
                            AWS
                        </td>

                        <td>
                           <input type="number"
       class="study-time-input"
       th:value="${item.studyTime}"
       min="0"
       step="1">
                        </td>

                        <td>
                            <button type="button"
                                    class="study-save-button">
                                学習内容を保存する
                            </button>
                        </td>

                        <td>
                            <button type="button"
                                    class="study-delete-button">
                                削除する
                            </button>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(infraList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

    </main>

    <!-- フッター -->
    <footer class="footer">
        portfolio site
    </footer>

</div>

</body>
</html>
