<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>学習データ一覧</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page">

    <!-- ヘッダー -->
    <header class="header header-between">
       <a th:href="@{/top}" class="header-title">
          My Portfolio
       </a>

        <form action="/logout" method="post">
            <button type="submit" class="header-button">
                ログアウト
            </button>
        </form>
    </header>

    <!-- メイン -->
    <main class="skill-edit-main">

        <!-- 対象月 -->
        <form method="get"
              action="/learning-data"
              class="skill-month-form">

            <select name="month"
                    onchange="this.form.submit()"
                    class="skill-month-select">

                <option th:each="month : ${monthList}"
                        th:value="${month}"
                        th:text="${month.monthValue + '月'}"
                        th:selected="${month.equals(selectedMonth)}">
                </option>

            </select>

        </form>

        <!-- バックエンド -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    バックエンド
                </h2>

               <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${backendCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

<tr th:each="item : ${backendList}">

    <td th:text="${item.itemName}">
        Java
    </td>

    <td>
        <input type="number"
               name="studyTime"
               th:form="'update-form-' + ${item.id}"
               class="study-time-input"
               th:value="${item.studyTime}"
               min="0"
               step="1">
    </td>

    <td>
        <form th:id="'update-form-' + ${item.id}"
              th:action="@{/learning-data/{id}/update(id=${item.id})}"
              method="post">

            <input type="hidden"
                   name="month"
                   th:value="${selectedMonth}">

            <button type="submit"
                    class="study-save-button">
                学習内容を保存する
            </button>

        </form>
    </td>

    <td>
    <form th:action="@{/learning-data/{id}/delete(id=${item.id})}"
          method="post">

        <input type="hidden"
               name="month"
               th:value="${selectedMonth}">

      <button type="submit"
        class="study-delete-button">
    削除する
</button>
    </form>
</td>

</tr>
                    <tr th:if="${#lists.isEmpty(backendList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

        <!-- フロントエンド -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    フロントエンド
                </h2>

              <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${frontendCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                   <tr th:each="item : ${frontendList}">

    <td th:text="${item.itemName}">
        HTML
    </td>

    <td>
        <input type="number"
               name="studyTime"
               th:form="'update-form-' + ${item.id}"
               class="study-time-input"
               th:value="${item.studyTime}"
               min="0"
               step="1">
    </td>

    <td>
        <form th:id="'update-form-' + ${item.id}"
              th:action="@{/learning-data/{id}/update(id=${item.id})}"
              method="post">

            <input type="hidden"
                   name="month"
                   th:value="${selectedMonth}">

            <button type="submit"
                    class="study-save-button">
                学習内容を保存する
            </button>

        </form>
    </td>

  <td>
    <form th:action="@{/learning-data/{id}/delete(id=${item.id})}"
          method="post">

        <input type="hidden"
               name="month"
               th:value="${selectedMonth}">

       <button type="submit"
        class="study-delete-button">
    削除する
</button>

    </form>
</td>
</tr>

                    <tr th:if="${#lists.isEmpty(frontendList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

        <!-- インフラ -->
        <section class="skill-category-card">

            <div class="skill-category-header">
                <h2 class="skill-category-title">
                    インフラ
                </h2>

               <a th:href="@{/learning-data/new(
        month=${selectedMonth},
        categoryId=${infraCategoryId}
    )}"
   class="skill-add-button">
    項目を追加する
</a>
            </div>

            <table class="skill-category-table">

                <thead>
                    <tr>
                        <th>項目名</th>
                        <th>学習時間</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                  <tr th:each="item : ${infraList}">

    <td th:text="${item.itemName}">
        AWS
    </td>

    <td>
        <input type="number"
               name="studyTime"
               th:form="'update-form-' + ${item.id}"
               class="study-time-input"
               th:value="${item.studyTime}"
               min="0"
               step="1">
    </td>

    <td>
        <form th:id="'update-form-' + ${item.id}"
              th:action="@{/learning-data/{id}/update(id=${item.id})}"
              method="post">

            <input type="hidden"
                   name="month"
                   th:value="${selectedMonth}">

            <button type="submit"
                    class="study-save-button">
                学習内容を保存する
            </button>

        </form>
    </td>

<td>
    <form th:action="@{/learning-data/{id}/delete(id=${item.id})}"
          method="post">

        <input type="hidden"
               name="month"
               th:value="${selectedMonth}">

      <button type="submit"
        class="study-delete-button">
    削除する
</button>
    </form>
</td>

</tr>

                    <tr th:if="${#lists.isEmpty(infraList)}">
                        <td colspan="4"
                            class="skill-empty-message">
                            登録されている項目はありません
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

    </main>

      <!-- 更新完了モーダル -->
    <div class="modal-overlay"
         th:if="${updateSuccess}"
         id="updateCompleteModal">

        <div class="modal-content">

            <p class="modal-message"
               th:text="${updateItemName + 'の学習時間を保存しました！'}">
                学習時間を保存しました！
            </p>

            <button type="button"
                    class="modal-close-button"
                    onclick="closeUpdateModal()">
                編集ページに戻る
            </button>

        </div>

    </div>

    <!-- 削除完了モーダル -->
    <div class="modal-overlay"
         th:if="${deleteSuccess}"
         id="deleteCompleteModal">

        <div class="modal-content">

            <p class="modal-message"
               th:text="${deleteItemName + 'を削除しました！'}">
                項目を削除しました！
            </p>

            <button type="button"
                    class="modal-close-button"
                    onclick="closeDeleteModal()">
                編集ページに戻る
            </button>

        </div>

    </div>

    <!-- フッター -->
    <footer class="footer">
        portfolio site
    </footer>
</div>
<script>
    function closeUpdateModal() {
        const modal =
            document.getElementById("updateCompleteModal");

        if (modal) {
            modal.style.display = "none";
        }
    }

    function closeDeleteModal() {
        const modal =
            document.getElementById("deleteCompleteModal");

        if (modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
