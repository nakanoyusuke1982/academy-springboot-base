<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>項目追加</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="skill-new-page">

    <header class="portfolio-header">
        <div class="portfolio-title">My Portfolio</div>

        <form action="/logout" method="post">
            <button type="submit" class="logout-button">
                ログアウト
            </button>
        </form>
    </header>

    <main class="skill-new-main">

        <h1 class="skill-new-title">項目追加</h1>

        <p class="target-month">
            対象月：
            <span th:text="${selectedMonth}"></span>
        </p>

        <form th:if="${successMessage == null}"
              th:object="${learningDataForm}"
              method="post"
              th:action="@{/learning-data}"
              class="skill-new-form">

            <input type="hidden"
                   th:field="*{month}">

            <div class="skill-form-group">
                <label for="categoryId">カテゴリ</label>

                <select id="categoryId"
                        th:field="*{categoryId}">

                    <option th:value="${infraCategoryId}">
    インフラ
</option>

<option th:value="${backendCategoryId}">
    バックエンド
</option>

<option th:value="${frontendCategoryId}">
    フロントエンド
</option>

                </select>
            </div>

            <div class="skill-form-group">
                <label for="itemName">項目名</label>

                <input type="text"
                       id="itemName"
                       th:field="*{itemName}"
                       maxlength="50"
                       placeholder="Java">

                <p class="error-message"
                   th:if="${errorMessage}"
                   th:text="${errorMessage}">
                </p>
            </div>

            <div class="skill-form-group">
                <label for="studyTime">学習時間</label>

                <input type="number"
                       id="studyTime"
                       th:field="*{studyTime}"
                       min="0"
                       placeholder="40">
            </div>

            <div class="skill-button-area">
                <button type="submit"
                        class="add-button">
                    追加する
                </button>
            </div>

        </form>

        <a class="edit-back-link"
           th:href="@{/learning-data(month=${selectedMonth})}">
            編集ページに戻る
        </a>

    </main>

    <div class="modal"
         th:if="${successMessage}">

        <div class="modal-background"></div>

        <div class="modal-box">
            <p class="modal-message"
               th:text="${successMessage}">
            </p>

            <a class="modal-button"
               th:href="@{/learning-data(month=${selectedMonth})}">
                編集ページに戻る
            </a>
        </div>
    </div>

    <footer class="portfolio-footer">
        portfolio site
    </footer>

</body>

</html>
